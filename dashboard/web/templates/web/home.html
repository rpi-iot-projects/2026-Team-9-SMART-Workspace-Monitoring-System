{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>SMART Desk Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'web/css/dashboard.css' %}">
</head>
 <body>
    <nav id="main-nav" class="navbar navbar-dark bg-dark" data-bs-theme="dark">
        <div class="container px-3 py-1">
            <span class="navbar-brand fs-3 fw-semibold">SMART Desk Dashboard </span>
            <span id="modeText" class="badge text-bg-secondary ms-2 fs-5">Idle</span>
        </div>
    </nav>
    <div class="container py-4">
        <div id="statusAlert" class="alert alert-success text-center mx-auto w-50 fs-2" role="alert">
            <div> <Strong>Calibrating sensors...</Strong> </div>
        </div>
        <div class="row">
            <!-- Distance Card -->
            <div class="col-md-6">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Distance</h5>
                        <canvas id="distanceChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Weight Card -->
            <div class="col-md-6">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Weight</h5>
                        <canvas id="weightChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{% static 'web/js/dashboard.js' %}"></script>
 </body>
</html>
